name: democracy

services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: democracy
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      MODE: ${MODE}
      #     LOGLEVEL: ${DJANGO_LOGLEVEL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: "db" # Name of the database container above.
      DB_PORT: "5432" # Port set in the database container above.
    env_file:
      - .env

  celery:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    command: celery -A project worker --loglevel=info
    volumes:
      - .:/app
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      MODE: ${MODE}
      #     LOGLEVEL: ${DJANGO_LOGLEVEL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: "db" # Name of the database container above.
      DB_PORT: "5432" # Port set in the database container above.
    depends_on:
      - db
      - redis
      - web

  celery_beat:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    command: celery -A project beat --loglevel=info
    volumes:
      - .:/app
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      MODE: ${MODE}
      #     LOGLEVEL: ${DJANGO_LOGLEVEL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: "db" # Name of the database container above.
      DB_PORT: "5432" # Port set in the database container above.
    depends_on:
      - db
      - redis
      - web
      - celery

  flower:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    command: celery -A project flower --port=5555
    ports:
      - "5555:5555"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      MODE: ${MODE}
      #     LOGLEVEL: ${DJANGO_LOGLEVEL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: "db" # Name of the database container above.
      DB_PORT: "5432" # Port set in the database container above.
    depends_on:
      - db
      - redis
      - web
      - celery
      - celery_beat

volumes:
  postgres_data: